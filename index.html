<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      if (typeof global === 'undefined') {
        window.global = Object.create(window);
        Object.defineProperty(window.global, 'fetch', {
          value: window.fetch.bind(window),
          writable: true,
          configurable: true
        });
      }
      if (typeof globalThis !== 'undefined' && typeof globalThis.global === 'undefined') {
        globalThis.global = window.global;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
